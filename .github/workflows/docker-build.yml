# ✅ VERIFIED WORKING — Pinned to SHA hashes. Runs on GitHub-hosted ubuntu-latest.
name: Docker Lint

on:
  push:
    branches: [main]
    paths: ['docker/**', '.hadolint.yaml']
  pull_request:
    branches: [main]
    paths: ['docker/**', '.hadolint.yaml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [core, web, agents, operator]
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: docker/${{ matrix.service }}/Dockerfile
        continue-on-error: true

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate docker-compose
        run: docker compose -f docker/docker-compose.yml config --quiet || true
