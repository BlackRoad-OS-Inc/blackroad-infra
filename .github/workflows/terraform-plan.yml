name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths: ['terraform/**']

concurrency:
  group: terraform-plan-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: [self-hosted, blackroad-fleet]
    strategy:
      matrix:
        environment: [staging, production]
    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
      - name: Terraform Init
        run: terraform init -backend=false
      - name: Terraform Validate
        run: terraform validate
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color 2>&1 | tee /tmp/plan-${{ matrix.environment }}.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          TF_VAR_cloudflare_api_token: "placeholder"
          TF_VAR_cloudflare_account_id: "placeholder"
          TF_VAR_digitalocean_token: "placeholder"
        continue-on-error: true
      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const planFile = '/tmp/plan-${{ matrix.environment }}.txt';
            const plan = fs.existsSync(planFile)
              ? fs.readFileSync(planFile, 'utf8').slice(-8000)
              : 'Plan output not available';
            const body = [
              `### Terraform Plan — \`${{ matrix.environment }}\``,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```terraform',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes(`Terraform Plan — \`${{ matrix.environment }}\``)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
